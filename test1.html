<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <div class="display">

    </div>

    <script>
        let fruits, output
        fruits = ["mango", "apple", "cherry", "melon"];

        output = "<ul>";
        for (let i = 0; i < fruits.length; i++) {
            output += "<li>" + fruits[i] + "</li>"
        }
        output += "</ul>";

        document.querySelector("div").innerHTML = output;

    </script>
</body>

</html>
